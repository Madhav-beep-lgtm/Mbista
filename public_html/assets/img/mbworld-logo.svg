  <!-- Monogram mark: navy rounded square, gold inner border, serif MB -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#0c4a6e"/>
  <rect x="6" y="6" width="52" height="52" rx="10" fill="none" stroke="#d9a33a" stroke-width="2.5"/>
  <text x="32" y="43" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="26" fill="#ffffff">MB</text>
  <!-- Wordmark -->
  <text x="78" y="34" font-family="Inter, 'Segoe UI', -apple-system, sans-serif" font-weight="800" font-size="26" letter-spacing="0.5" fill="#0c4a6e">M.B.<tspan fill="#0f6b3d"> World</tspan></text>
  <text x="79" y="52" font-family="Inter, 'Segoe UI', -apple-system, sans-serif" font-weight="600" font-size="10.5" letter-spacing="3.4" fill="#5a7482">ACCOUNTING PLATFORM</text>
